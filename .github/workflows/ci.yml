name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: Lint + Test ─────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: server/package-lock.json
        
    - name: Install Dependencies
      working-directory: ./server
      run: npm ci
      
    - name: Run Tests
      working-directory: ./server
      run: npm test
      
    - name: Run Tests with Coverage
      working-directory: ./server
      run: npm run test:coverage

  # ─── Frontend: Lint + Build ───────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json
        
    - name: Install Dependencies
      working-directory: ./client
      run: npm ci
      
    - name: Lint
      working-directory: ./client
      run: npm run lint -- --max-warnings 20
      
    - name: Build
      working-directory: ./client
      run: npm run build

  # ─── Docker: Build Images ────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Build Backend Docker Image
      run: docker build -t resume-analyzer-backend ./server
      
    - name: Build Frontend Docker Image
      run: docker build -t resume-analyzer-frontend ./client

    - name: Verify Images
      run: |
        docker images resume-analyzer-backend
        docker images resume-analyzer-frontend
